name: Tests

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: '0 9 * * *'   # daily canary: catches API/schema breakage before the sends do

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r requirements.txt pytest azure-functions azure-storage-blob
      - run: python -m pytest tests/ -v
